<div class="login-page">
  <div class="login-card">
    <div class="login-icon"></div>
    <h2>Nouveau mot de passe</h2>
    <p class="subtitle">Choisissez un nouveau mot de passe</p>

    <div *ngIf="succes" class="succes">{{ succes }}</div>
    <div *ngIf="erreur" class="erreur">{{ erreur }}</div>

    <div *ngIf="!succes">
      <div class="form-group">
        <label>Nouveau mot de passe</label>
        <input [(ngModel)]="newPassword" type="password" placeholder="••••••••">
      </div>
      <div class="form-group">
        <label>Confirmer le mot de passe</label>
        <input [(ngModel)]="confirmPassword" type="password" placeholder="••••••••">
      </div>
      <button class="btn-login" (click)="reinitialiser()" [disabled]="loading">
        {{ loading ? 'En cours...' : 'Réinitialiser' }}
      </button>
    </div>
  </div>
</div>
