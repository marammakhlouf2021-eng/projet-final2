<app-barre-navigation></app-barre-navigation>

<div class="content">
  <div class="header">
    <h2>Gestion des Étudiants</h2>
    <button class="btn-ajouter" (click)="showForm = !showForm">+ Ajouter</button>
  </div>

  <div *ngIf="showForm" class="form-card">
    <h3>Nouvel Étudiant</h3>
    <div *ngIf="erreurForm" class="erreur-msg">{{ erreurForm }}</div>
    <div *ngIf="successForm" class="succes-msg">{{ successForm }}</div>
    <div class="form-row">
      <input [(ngModel)]="nouvelEtu.email" placeholder="Email *" type="email">
      <select [(ngModel)]="nouvelEtu.classe">
        <option value="">Classe (optionnelle)</option>
        <option *ngFor="let cls of classes" [value]="cls._id">{{ cls.nom }}</option>
      </select>
    </div>
    <div class="form-actions">
      <button class="btn-enregistrer" (click)="ajouter()">Enregistrer</button>
      <button class="btn-annuler" (click)="showForm = false; erreurForm = ''; successForm = ''">Annuler</button>
    </div>
  </div>

  <table>
    <thead>
      <tr>
        <th>Nom</th>
        <th>Prénom</th>
        <th>Email</th>
        <th>Téléphone</th>
        <th>Classe</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <ng-container *ngFor="let etu of etudiants">
        <tr>
          <td>{{ etu.nom }}</td>
          <td>{{ etu.prenom }}</td>
          <td>{{ etu.email }}</td>
          <td>{{ etu.telephone || '—' }}</td>
          <td>{{ etu.classe?.nom || '—' }}</td>
          <td class="actions">
            <button class="btn-modifier" (click)="modifier(etu)">Modifier</button>
            <button class="btn-supprimer" (click)="supprimer(etu._id)">Supprimer</button>
          </td>
        </tr>
        <tr *ngIf="etudiantModifier && etudiantModifier._id === etu._id" class="ligne-edit">
          <td><input [(ngModel)]="etudiantModifier.nom" placeholder="Nom"></td>
          <td><input [(ngModel)]="etudiantModifier.prenom" placeholder="Prénom"></td>
          <td><input [(ngModel)]="etudiantModifier.email" placeholder="Email"></td>
          <td><input [(ngModel)]="etudiantModifier.telephone" placeholder="Téléphone"></td>
          <td>
            <select [(ngModel)]="etudiantModifier.classe">
              <option value="">Sans classe</option>
              <option *ngFor="let cls of classes" [value]="cls._id">{{ cls.nom }}</option>
            </select>
          </td>
          <td class="actions">
            <button class="btn-enregistrer" (click)="enregistrerModification()">Enregistrer</button>
            <button class="btn-annuler" (click)="annuler()">Annuler</button>
          </td>
        </tr>
      </ng-container>
    </tbody>
  </table>
  <p *ngIf="etudiants.length === 0" class="no-data">Aucun étudiant enregistré</p>
</div>
